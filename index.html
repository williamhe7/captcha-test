<!DOCTYPE html>
<html>
<head>
    <title>CAPTCHA Test</title>

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>CAPTCHA Model Testing</h1>

<p>
Complete CAPTCHA before submitting:
</p>


<form id="captchaForm">

    <div class="g-recaptcha"
         data-sitekey="6LdxcUktAAAAABT7yLsYSjHtEfc8VmCF6hNT0gxV">
    </div>

    <br>

    <button type="submit">
        Submit
    </button>

</form>


<div id="result"></div>


<script>

document
.getElementById("captchaForm")
.addEventListener("submit", async function(e){

    e.preventDefault();


    const token = grecaptcha.getResponse();


    if (!token) {
        document.getElementById("result").innerHTML =
        "Please complete CAPTCHA";
        return;
    }


    const response = await fetch(
        "https://captcha-test-jt5u4f7ar-duncecaps.vercel.app/api/verify",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                token:token
            })
        }
    );


    const data = await response.json();


    if(data.success){

        document.getElementById("result").innerHTML =
        "CAPTCHA passed";

    } else {

        document.getElementById("result").innerHTML =
        "CAPTCHA failed";

    }


});


</script>


</body>
</html>
